apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-chart-a
  labels:
    app.kubernetes.io/name: chart-a
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: chart-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chart-a
    spec:
      containers:
        - name: chart-a
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
